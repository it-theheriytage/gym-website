<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mhetre Tower Gym | Elite Fitness Club</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* HERO */
.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)),
url('https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}

.hero h1{
font-size:70px;
color:#d4af37;
font-weight:800;
letter-spacing:2px;
}

.hero p{
color:#ccc;
margin-top:15px;
font-size:18px;
}

.btn{
margin-top:25px;
padding:15px 40px;
border:none;
background:linear-gradient(45deg,#d4af37,#ffcc70);
color:black;
border-radius:50px;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 10%;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(15px);
z-index:1000;
border-bottom:1px solid rgba(212,175,55,0.2);
}

nav h2{
color:#d4af37;
}

nav a{
color:white;
margin:0 12px;
text-decoration:none;
font-size:14px;
}

nav a:hover{
color:#d4af37;
}

/* SECTIONS */
section{
padding:90px 10%;
text-align:center;
}

h2{
color:#d4af37;
font-size:40px;
margin-bottom:40px;
}

/* CARDS */
.grid{
display:flex;
gap:25px;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
width:260px;
border-radius:18px;
backdrop-filter:blur(12px);
border:1px solid rgba(212,175,55,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
border:1px solid #d4af37;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:white;
text-decoration:none;
z-index:9999;
}

/* BOTTOM NAV */
.bottom-nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:black;
padding:12px;
border-top:1px solid #d4af37;
}

.bottom-nav a{
color:white;
text-decoration:none;
font-size:18px;
}

/* FORM */
.form{
background:#111;
padding:30px;
border-radius:15px;
width:300px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:40px;}
.grid{flex-direction:column;align-items:center;}
.card{width:90%;}
nav{flex-direction:column;}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<h2>Mhetre Tower Gym</h2>
<div>
<a href="#programs">Programs</a>
<a href="#pricing">Pricing</a>
<a href="#contact">Contact</a>
</div>
</nav>

<!-- HERO -->
<div class="hero">
<div>
<h1>Mhetre Tower Gym</h1>
<p>Luxury Fitness Club • Jule Solapur, Solapur</p>

<!-- PAYMENT -->
<a href="https://rzp.io/l/your-payment-link">
<button class="btn">Join Premium</button>
</a>
</div>
</div>

<!-- PROGRAMS -->
<section id="programs">
<h2>Elite Programs</h2>
<div class="grid">
<div class="card">Fat Loss Transformation</div>
<div class="card">Muscle Building</div>
<div class="card">Strength Training</div>
</div>
</section>

<!-- PRICING -->
<section id="pricing">
<h2>Membership Plans</h2>
<div class="grid">
<div class="card">Silver ₹999</div>
<div class="card">Gold ₹1999</div>
<div class="card">Platinum ₹2999</div>
</div>
</section>

<!-- CONTACT FORM -->
<section id="contact">
<h2>Join Now</h2>

<div class="form">
<input placeholder="Name">
<input placeholder="Phone">
<button class="btn">Submit</button>
</div>

<p style="margin-top:20px;">📍 Mhetre Tower Gym, Jule Solapur</p>
</section>

<!-- WHATSAPP -->
<a href="https://wa.me/919876543210" class="whatsapp">💬</a>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
<a href="#">🏠</a>
<a href="#programs">🏋️</a>
<a href="#pricing">💰</a>
<a href="#contact">📍</a>
</div>

</body>
</html>
