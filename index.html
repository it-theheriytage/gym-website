<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mhetre Tower Gym | World-Class Fitness</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

/* 3D CANVAS BACKGROUND */
#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 10%;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(212,175,55,0.2);
z-index:1000;
}

nav h2{
color:#d4af37;
font-weight:800;
letter-spacing:1px;
}

nav a{
color:#ddd;
margin:0 12px;
text-decoration:none;
font-size:14px;
}

nav a:hover{
color:#d4af37;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero-card{
padding:50px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(212,175,55,0.2);
border-radius:25px;
box-shadow:0 0 60px rgba(212,175,55,0.08);
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
}

.hero h1{
font-size:70px;
font-weight:900;
color:#d4af37;
}

.hero p{
color:#aaa;
margin-top:15px;
}

/* BUTTON */
.btn{
margin-top:25px;
padding:15px 45px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#d4af37,#ffcc70);
color:black;
font-weight:700;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* SECTIONS */
section{
padding:100px 10%;
text-align:center;
}

h2{
font-size:42px;
color:#d4af37;
margin-bottom:50px;
}

.grid{
display:flex;
gap:25px;
justify-content:center;
flex-wrap:wrap;
}

.card{
width:260px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(15px);
border:1px solid rgba(212,175,55,0.2);
transition:0.4s;
}

.card:hover{
transform:translateY(-12px) scale(1.02);
border:1px solid #d4af37;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
display:flex;
justify-content:center;
align-items:center;
border-radius:50%;
font-size:26px;
text-decoration:none;
color:white;
box-shadow:0 0 20px rgba(0,0,0,0.4);
z-index:9999;
}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:40px;}
.grid{flex-direction:column;}
.card{width:90%;}
nav{flex-direction:column;}
}
</style>
</head>

<body>

<!-- 3D BACKGROUND -->
<canvas id="bg"></canvas>

<!-- NAV -->
<nav>
<h2>Mhetre Tower Gym</h2>
<div>
<a href="#programs">Programs</a>
<a href="#pricing">Pricing</a>
<a href="#contact">Contact</a>
</div>
</nav>

<!-- HERO -->
<div class="hero">
<div class="hero-card">
<h1>Mhetre Tower Gym</h1>
<p>World-Class Fitness Experience • Jule Solapur, Solapur</p>

<a href="https://rzp.io/l/your-payment-link">
<button class="btn">Join Premium</button>
</a>
</div>
</div>

<!-- PROGRAMS -->
<section id="programs">
<h2>Elite Training</h2>
<div class="grid">
<div class="card">Fat Loss System</div>
<div class="card">Muscle Building Pro</div>
<div class="card">Strength Engineering</div>
</div>
</section>

<!-- PRICING -->
<section id="pricing">
<h2>Membership</h2>
<div class="grid">
<div class="card">Silver ₹999</div>
<div class="card">Gold ₹1999</div>
<div class="card">Platinum ₹2999</div>
</div>
</section>

<!-- CONTACT -->
<section id="contact">
<h2>Contact</h2>
<p>📍 Jule Solapur, Solapur</p>
<p>📞 +91 9876543210</p>
</section>

<!-- WHATSAPP -->
<a href="https://wa.me/919876543210" class="whatsapp">💬</a>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);

const geometry = new THREE.TetrahedronGeometry(0.6,0);
const material = new THREE.MeshBasicMaterial({color:0xd4af37,wireframe:true});

const shapes = [];

for(let i=0;i<25;i++){
let mesh = new THREE.Mesh(geometry,material);
mesh.position.x = (Math.random()-0.5)*10;
mesh.position.y = (Math.random()-0.5)*10;
mesh.position.z = (Math.random()-0.5)*10;
scene.add(mesh);
shapes.push(mesh);
}

function animate(){
requestAnimationFrame(animate);

shapes.forEach(s=>{
s.rotation.x += 0.01;
s.rotation.y += 0.01;
});

renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
